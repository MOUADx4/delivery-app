<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <title>Delivery App</title>

    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <header>
        <h1> Delivery App</h1>
        <p>Gestion des commandes — FastAPI + DynamoDB</p>
    </header>

    <main>

        <!-- 1) Créer une commande -->
        <section class="card">
            <h2> Créer une commande</h2>

            <form id="createOrderForm" class="form">
                <div class="form-group">
                    <label>User ID</label>
                    <input type="text" id="userId" placeholder="USER#101" required>
                </div>

                <div class="form-group">
                    <label>Adresse de livraison</label>
                    <input type="text" id="deliveryAddress" placeholder="12 rue Exemple" required>
                </div>

                <div class="form-group">
                    <label>Restaurant ID</label>
                    <input type="text" id="restaurantId" placeholder="RESTO#101" required>
                </div>

                <div class="form-group">
                    <label>Items (name,qty,price par ligne)</label>
                    <textarea id="itemsInput" rows="4" placeholder="Burger,1,8&#10;Coca,1,2"></textarea>
                </div>

                <button class="btn-primary" type="submit">Créer la commande</button>
            </form>

            <div id="createResult" class="result"></div>
        </section>

        <!-- 2) Voir commandes d’un user -->
        <section class="card">
            <h2> Commandes d’un utilisateur</h2>

            <form id="getUserOrdersForm" class="form-inline">
                <input type="text" id="searchUserId" placeholder="USER#101" required>
                <button class="btn-secondary" type="submit">Charger</button>
            </form>

            <div id="ordersList"></div>
        </section>

        <!-- 3) Voir une commande par ID -->
        <section class="card">
            <h2> Rechercher une commande</h2>

            <form id="getOrderByIdForm" class="form-inline">
                <input type="text" id="searchOrderId" placeholder="ORDER#123456" required>
                <button class="btn-secondary" type="submit">Rechercher</button>
            </form>

            <div id="singleOrder"></div>
        </section>

    </main>

    <footer>
        <p>© 2026 — Delivery App</p>
    </footer>

</body>
</html>
